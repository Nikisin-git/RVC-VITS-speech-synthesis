name: voicegen
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - pytorch=2.4.0
  - torchaudio=2.4.0
  - pytorch-cuda=11.8
  - ffmpeg=6.0
  - pip:
      - "setuptools>=68,<81"
      - PySide6==6.6.3
      - demucs==4.0.1
      - deepfilternet==0.5.6
      - silero-vad
      - librosa>=0.10
      - soundfile>=0.12
      - pydub>=0.25
      - ffmpeg-python>=0.2
      - pedalboard==0.9.12
      - lameenc>=1.7
      - openai-whisper
      - resemblyzer
      - transliterate
      - phonemizer
      - jiwer
      - numpy>=1.24,<2.0
      - scipy>=1.11
      - tqdm
      - PyYAML
      - matplotlib>=3.7
      - tensorboard>=2.13
      - coqui-tts>=0.24
      - "transformers>=4.57,<5.0"
      - "datasets>=2.16,<4.0"
      - accelerate>=0.26
